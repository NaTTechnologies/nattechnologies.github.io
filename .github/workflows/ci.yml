name: Cafetal OS Website CI

on:
  push:
    branches: ['main']
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and audit
        run: npm run check

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: cafetal-os-website-dist
          path: dist
