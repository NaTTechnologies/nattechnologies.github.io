name: Reportar un error
description: Informar una falla reproducible sin compartir datos privados.
title: "[Bug]: "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Versión
      placeholder: 2.0.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Sistema operativo
      options: [Windows, macOS, Linux]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Use datos ficticios y enumere cada acción.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Resultado esperado
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Resultado observado
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacidad
      options:
        - label: Confirmo que no adjunté una base real ni datos personales.
          required: true
